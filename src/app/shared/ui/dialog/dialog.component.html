@if (open) {
  <div class="fixed inset-0 z-50 bg-slate-950/40 px-4 py-10">
    <div class="mx-auto w-full max-w-lg rounded-xl border border-border bg-surface p-6 shadow-soft">
      <div class="mb-4">
        <h3 class="text-lg font-semibold text-foreground">{{ title }}</h3>
        @if (description) {
          <p class="mt-1 text-sm text-muted">{{ description }}</p>
        }
      </div>

      <div class="mb-4 flex justify-end">
        <button
          type="button"
          class="text-sm font-semibold text-muted hover:text-foreground"
          (click)="close()"
        >
          Close
        </button>
      </div>

      <ng-content />
    </div>
  </div>
}
