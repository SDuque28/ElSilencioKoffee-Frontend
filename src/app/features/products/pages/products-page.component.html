<section class="space-y-6">
  <div>
    <h1 class="text-2xl font-semibold text-foreground">Coffee Products</h1>
    <p class="text-sm text-muted">Explore curated coffee products from El Silencio Koffee.</p>
  </div>

  <div class="grid gap-4 md:grid-cols-2 xl:grid-cols-3">
    @for (product of products; track product.id) {
      <app-card>
        <div class="mb-3 flex items-center justify-between">
          <h2 class="text-lg font-semibold">{{ product.name }}</h2>
          <app-badge [variant]="badgeVariant(product.tag)">{{ product.tag }}</app-badge>
        </div>

        <p class="text-sm text-muted">{{ product.description }}</p>
        <p class="mt-4 text-lg font-semibold text-primary">{{ product.price }}</p>

        <div class="mt-4 flex gap-2">
          <app-button size="sm" routerLink="/product/{{ product.id }}">Details</app-button>
          <app-button size="sm" variant="outline" routerLink="/cart">Add to cart</app-button>
        </div>
      </app-card>
    }
  </div>
</section>
