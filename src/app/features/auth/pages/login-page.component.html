<div class="mx-auto max-w-md py-12">
  <app-card>
    <h1 class="text-2xl font-semibold text-foreground">Login</h1>
    <p class="mt-1 text-sm text-muted">Access your ecommerce and analytics workspace.</p>

    <form class="mt-6 space-y-4" [formGroup]="form" (ngSubmit)="submit()">
      <app-form-field label="Email">
        <input class="{{ controlClasses }}" type="email" formControlName="email" />
      </app-form-field>

      <app-form-field label="Password">
        <input class="{{ controlClasses }}" type="password" formControlName="password" />
      </app-form-field>

      <app-button type="submit" className="w-full">Sign In</app-button>
    </form>

    <p class="mt-4 text-sm text-muted">
      No account yet?
      <a routerLink="/register" class="font-medium text-primary hover:underline">Create one</a>
    </p>
  </app-card>
</div>
