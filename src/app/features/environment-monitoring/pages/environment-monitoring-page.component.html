<section class="space-y-6">
  <div>
    <h1 class="text-2xl font-semibold text-[#f3f4f6]">Environmental Monitoring</h1>
    <p class="text-sm text-[#9ca3af]">Track humidity and temperature from sensor streams.</p>
  </div>

  <app-card className="border-[#2a2a2e] bg-[#1a1a1d] text-[#e5e5e5] shadow-none">
    <h2 class="mb-4 text-lg font-semibold text-[#f3f4f6]">Temperature</h2>
    <app-chart-container type="line" [data]="temperatureData" [options]="chartOptions" />
  </app-card>

  <app-card className="border-[#2a2a2e] bg-[#1a1a1d] text-[#e5e5e5] shadow-none">
    <h2 class="mb-4 text-lg font-semibold text-[#f3f4f6]">Humidity</h2>
    <app-chart-container type="line" [data]="humidityData" [options]="chartOptions" />
  </app-card>
</section>
