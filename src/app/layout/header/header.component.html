<header class="sticky top-0 z-40 border-b border-border bg-surface/95 backdrop-blur">
  <div class="mx-auto flex h-16 w-full max-w-screen-2xl items-center justify-between px-4">
    <a
      class="flex items-center gap-2 text-foreground"
      routerLink="/products"
      (click)="closeMobileNav()"
    >
      <lucide-icon [img]="icons.coffee" class="h-5 w-5"></lucide-icon>
      <span class="text-sm font-bold tracking-wide">El Silencio Koffee</span>
    </a>

    <nav class="hidden items-center gap-5 text-sm font-medium md:flex">
      <a
        routerLink="/products"
        routerLinkActive="text-primary"
        class="text-muted hover:text-foreground"
        >Products</a
      >
      <a
        routerLink="/cart"
        routerLinkActive="text-primary"
        class="flex items-center gap-1 text-muted hover:text-foreground"
      >
        <lucide-icon [img]="icons.cart" class="h-4 w-4"></lucide-icon>
        Cart
      </a>
      <a
        routerLink="/orders"
        routerLinkActive="text-primary"
        class="text-muted hover:text-foreground"
        >Orders</a
      >
      <a
        routerLink="/dashboard"
        routerLinkActive="text-primary"
        class="flex items-center gap-1 text-muted hover:text-foreground"
      >
        <lucide-icon [img]="icons.dashboard" class="h-4 w-4"></lucide-icon>
        Admin
      </a>
    </nav>

    <div class="hidden items-center gap-2 md:flex">
      @if (authService.isAuthenticated()) {
        <span class="rounded-full bg-amber-100 px-2.5 py-1 text-xs font-medium text-amber-900">
          {{ authService.currentUser()?.name ?? 'Signed in' }}
        </span>
        <button
          type="button"
          class="inline-flex items-center gap-1 rounded-md border border-border px-3 py-2 text-xs font-semibold"
          (click)="logout()"
        >
          <lucide-icon [img]="icons.logout" class="h-4 w-4"></lucide-icon>
          Logout
        </button>
      } @else {
        <a
          routerLink="/login"
          class="rounded-md bg-primary px-3 py-2 text-xs font-semibold text-primary-foreground"
          >Login</a
        >
      }
    </div>

    <button
      type="button"
      class="inline-flex h-9 w-9 items-center justify-center rounded-md border border-border md:hidden"
      (click)="toggleMobileNav()"
      aria-label="Toggle navigation"
    >
      <lucide-icon [img]="icons.menu" class="h-4 w-4"></lucide-icon>
    </button>
  </div>

  @if (mobileNavOpen()) {
    <div class="border-t border-border bg-surface px-4 py-3 md:hidden">
      <div class="flex flex-col gap-2 text-sm">
        <a
          routerLink="/products"
          class="rounded px-2 py-1.5 hover:bg-amber-50"
          (click)="closeMobileNav()"
          >Products</a
        >
        <a
          routerLink="/cart"
          class="rounded px-2 py-1.5 hover:bg-amber-50"
          (click)="closeMobileNav()"
          >Cart</a
        >
        <a
          routerLink="/orders"
          class="rounded px-2 py-1.5 hover:bg-amber-50"
          (click)="closeMobileNav()"
          >Orders</a
        >
        <a
          routerLink="/dashboard"
          class="rounded px-2 py-1.5 hover:bg-amber-50"
          (click)="closeMobileNav()"
          >Dashboard</a
        >
        @if (authService.isAuthenticated()) {
          <button
            type="button"
            class="rounded px-2 py-1.5 text-left hover:bg-amber-50"
            (click)="logout()"
          >
            Logout
          </button>
        } @else {
          <a
            routerLink="/login"
            class="rounded px-2 py-1.5 hover:bg-amber-50"
            (click)="closeMobileNav()"
            >Login</a
          >
        }
      </div>
    </div>
  }
</header>
