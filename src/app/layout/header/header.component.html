<header
  class="sticky top-0 z-40 border-b backdrop-blur"
  [class.border-[#2a2a2e]]="isAdminLayout"
  [class.bg-[#121212]/95]="isAdminLayout"
  [class.border-[#e9e0d5]]="!isAdminLayout"
  [class.bg-[#fffaf5]/95]="!isAdminLayout"
>
  <div class="mx-auto flex h-16 w-full max-w-screen-2xl items-center justify-between px-4">
    <a
      class="flex items-center gap-2"
      [class.text-[#f4ede5]]="isAdminLayout"
      [class.text-[#2f2219]]="!isAdminLayout"
      routerLink="/"
      (click)="closeMobileNav()"
    >
      <lucide-icon [img]="icons.coffee" class="h-5 w-5"></lucide-icon>
      <span class="text-sm font-bold tracking-wide">El Silencio Koffee</span>
    </a>

    <nav class="hidden items-center gap-5 text-sm font-medium md:flex">
      <a
        routerLink="/"
        routerLinkActive="text-primary"
        class="transition"
        [class.text-[#9ca3af]]="isAdminLayout"
        [class.hover:text-[#f5efe8]]="isAdminLayout"
        [class.text-[#6b5c4f]]="!isAdminLayout"
        [class.hover:text-[#2f2219]]="!isAdminLayout"
        >Home</a
      >
      <a
        routerLink="/products"
        routerLinkActive="text-primary"
        class="transition"
        [class.text-[#9ca3af]]="isAdminLayout"
        [class.hover:text-[#f5efe8]]="isAdminLayout"
        [class.text-[#6b5c4f]]="!isAdminLayout"
        [class.hover:text-[#2f2219]]="!isAdminLayout"
        >Products</a
      >
      <button
        type="button"
        class="flex items-center gap-1 transition"
        [class.text-[#9ca3af]]="isAdminLayout"
        [class.hover:text-[#f5efe8]]="isAdminLayout"
        [class.text-[#6b5c4f]]="!isAdminLayout"
        [class.hover:text-[#2f2219]]="!isAdminLayout"
        (click)="openCart()"
      >
        <lucide-icon [img]="icons.cart" class="h-4 w-4"></lucide-icon>
        Cart
        @if (cartState.itemCount() > 0) {
          <span
            class="inline-flex min-w-5 items-center justify-center rounded-full bg-[#6b3f1d] px-1.5 py-0.5 text-[10px] font-semibold text-white"
          >
            {{ cartState.itemCount() }}
          </span>
        }
      </button>
      <a
        routerLink="/orders"
        routerLinkActive="text-primary"
        class="transition"
        [class.text-[#9ca3af]]="isAdminLayout"
        [class.hover:text-[#f5efe8]]="isAdminLayout"
        [class.text-[#6b5c4f]]="!isAdminLayout"
        [class.hover:text-[#2f2219]]="!isAdminLayout"
        >Orders</a
      >
      <a
        routerLink="/dashboard"
        routerLinkActive="text-primary"
        class="flex items-center gap-1 transition"
        [class.text-[#9ca3af]]="isAdminLayout"
        [class.hover:text-[#f5efe8]]="isAdminLayout"
        [class.text-[#6b5c4f]]="!isAdminLayout"
        [class.hover:text-[#2f2219]]="!isAdminLayout"
      >
        <lucide-icon [img]="icons.dashboard" class="h-4 w-4"></lucide-icon>
        Admin
      </a>
    </nav>

    <div class="hidden items-center gap-2 md:flex">
      @if (authService.isAuthenticated()) {
        <span
          class="rounded-full px-2.5 py-1 text-xs font-medium"
          [class.bg-[#31231d]]="isAdminLayout"
          [class.text-[#f4ede5]]="isAdminLayout"
          [class.bg-[#efe1d1]]="!isAdminLayout"
          [class.text-[#8b4f2a]]="!isAdminLayout"
        >
          {{ authService.currentUser()?.name ?? 'Signed in' }}
        </span>
        <button
          type="button"
          class="inline-flex items-center gap-1 rounded-md border px-3 py-2 text-xs font-semibold transition"
          [class.border-[#2f2f34]]="isAdminLayout"
          [class.text-[#f4ede5]]="isAdminLayout"
          [class.hover:bg-[#1c1c20]]="isAdminLayout"
          [class.border-[#e3d6c8]]="!isAdminLayout"
          [class.text-[#2f2219]]="!isAdminLayout"
          [class.hover:bg-[#f5ede4]]="!isAdminLayout"
          (click)="logout()"
        >
          <lucide-icon [img]="icons.logout" class="h-4 w-4"></lucide-icon>
          Logout
        </button>
      } @else {
        <a
          routerLink="/login"
          class="rounded-full px-4 py-2 text-xs font-semibold text-white transition"
          [class.bg-[#ff7a00]]="isAdminLayout"
          [class.hover:bg-[#e96f00]]="isAdminLayout"
          [class.bg-[#6b3f1d]]="!isAdminLayout"
          [class.hover:bg-[#5a3418]]="!isAdminLayout"
          >Login</a
        >
      }
    </div>

    <button
      type="button"
      class="inline-flex h-9 w-9 items-center justify-center rounded-md border md:hidden"
      [class.border-[#2f2f34]]="isAdminLayout"
      [class.text-[#f4ede5]]="isAdminLayout"
      [class.border-[#e3d6c8]]="!isAdminLayout"
      [class.text-[#2f2219]]="!isAdminLayout"
      (click)="toggleMobileNav()"
      aria-label="Toggle navigation"
    >
      <lucide-icon [img]="icons.menu" class="h-4 w-4"></lucide-icon>
    </button>
  </div>

  @if (mobileNavOpen()) {
    <div
      class="border-t px-4 py-3 md:hidden"
      [class.border-[#2a2a2e]]="isAdminLayout"
      [class.bg-[#121212]]="isAdminLayout"
      [class.border-[#e9e0d5]]="!isAdminLayout"
      [class.bg-[#fffaf5]]="!isAdminLayout"
    >
      <div class="flex flex-col gap-2 text-sm">
        <a
          routerLink="/"
          class="rounded px-2 py-1.5 transition"
          [class.text-[#f4ede5]]="isAdminLayout"
          [class.hover:bg-[#1c1c20]]="isAdminLayout"
          [class.text-[#2f2219]]="!isAdminLayout"
          [class.hover:bg-[#f5ede4]]="!isAdminLayout"
          (click)="closeMobileNav()"
          >Home</a
        >
        <a
          routerLink="/products"
          class="rounded px-2 py-1.5 transition"
          [class.text-[#f4ede5]]="isAdminLayout"
          [class.hover:bg-[#1c1c20]]="isAdminLayout"
          [class.text-[#2f2219]]="!isAdminLayout"
          [class.hover:bg-[#f5ede4]]="!isAdminLayout"
          (click)="closeMobileNav()"
          >Products</a
        >
        <button
          type="button"
          class="rounded px-2 py-1.5 transition"
          [class.text-[#f4ede5]]="isAdminLayout"
          [class.hover:bg-[#1c1c20]]="isAdminLayout"
          [class.text-[#2f2219]]="!isAdminLayout"
          [class.hover:bg-[#f5ede4]]="!isAdminLayout"
          (click)="openCart()"
        >
          Cart
        </button>
        <a
          routerLink="/orders"
          class="rounded px-2 py-1.5 transition"
          [class.text-[#f4ede5]]="isAdminLayout"
          [class.hover:bg-[#1c1c20]]="isAdminLayout"
          [class.text-[#2f2219]]="!isAdminLayout"
          [class.hover:bg-[#f5ede4]]="!isAdminLayout"
          (click)="closeMobileNav()"
          >Orders</a
        >
        <a
          routerLink="/dashboard"
          class="rounded px-2 py-1.5 transition"
          [class.text-[#f4ede5]]="isAdminLayout"
          [class.hover:bg-[#1c1c20]]="isAdminLayout"
          [class.text-[#2f2219]]="!isAdminLayout"
          [class.hover:bg-[#f5ede4]]="!isAdminLayout"
          (click)="closeMobileNav()"
          >Dashboard</a
        >
        @if (authService.isAuthenticated()) {
          <button
            type="button"
            class="rounded px-2 py-1.5 text-left transition"
            [class.text-[#f4ede5]]="isAdminLayout"
            [class.hover:bg-[#1c1c20]]="isAdminLayout"
            [class.text-[#2f2219]]="!isAdminLayout"
            [class.hover:bg-[#f5ede4]]="!isAdminLayout"
            (click)="logout()"
          >
            Logout
          </button>
        } @else {
          <a
            routerLink="/login"
            class="rounded px-2 py-1.5 transition"
            [class.text-[#f4ede5]]="isAdminLayout"
            [class.hover:bg-[#1c1c20]]="isAdminLayout"
            [class.text-[#2f2219]]="!isAdminLayout"
            [class.hover:bg-[#f5ede4]]="!isAdminLayout"
            (click)="closeMobileNav()"
            >Login</a
          >
        }
      </div>
    </div>
  }
</header>
