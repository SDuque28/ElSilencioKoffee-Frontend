<div class="min-h-screen bg-background">
  <app-header />

  <div class="mx-auto w-full max-w-screen-2xl px-4 py-6">
    @if (layout === 'admin') {
      <div class="flex flex-col gap-4 lg:flex-row lg:items-start">
        <div class="hidden lg:block">
          <app-sidebar />
        </div>
        <main class="min-w-0 flex-1">
          <router-outlet />
        </main>
      </div>
    } @else {
      <main>
        <router-outlet />
      </main>
    }
  </div>

  <app-footer />
</div>
